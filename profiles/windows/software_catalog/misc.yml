  git_2_44_0:
    source:
      type: local
      path: "D:\\ManualDrops"
      filename: "Git-2.44.0-64-bit.exe"
    install:
      type: exe
      arguments: "/VERYSILENT"
      check:
        path_exists: "C:\\Program Files\\Git\\bin\\git.exe"

  vscode_1_87_0:
    source:
      type: jfrog
      url: "https://jfrog.com"      
      filename: "Git-2.44.0-64-bit.exe"
    install:
      type: exe
      arguments: "/VERYSILENT"
      check:
        path_exists: "C:\\Program Files\\Git\\bin\\git.exe"

  python_3_13_2:
    source:
      type: jfrog
      path: "D:\\ManualDrops"
      filename: "python-3.13.2-amd64.exe"
    install:
      type: exe
      arguments: "/quiet InstallAllUsers=1 PrependPath=1 Include_test=0"
      check:
        path_exists: "C:\\Program Files\\Python313\\python.exe"

  python_3_10_11:
    source:
      type: local
      path: "D:\\ManualDrops"
      filename: "python-3.10.11-amd64.exe"
    install:
      type: exe
      arguments: "/quiet InstallAllUsers=1 PrependPath=1 Include_test=0"
      check:
        path_exists: "C:\\Program Files\\Python310\\python.exe"

  maven:
    source:
      type: local
      path: "D:\\ManualDrops"
      filename: "apache-maven-3.9.9-bin.zip"

    install:
      type: zip
      destination: "C:\\Tools\\apache-maven-3.9.9"
      check:
        path_exists: "C:\\Tools\\apache-maven-3.9.9\\bin\\mvn.cmd"

    path:
      enabled: true
      entries:
        - "C:\\Tools\\apache-maven-3.9.9\\bin"

    env:
      enabled: true
      variables:
        JAVA_HOME: /opt/jdk
        MAVEN_HOME: /opt/maven    

    registry:
      enabled: true
      entries:
        - path: HKLM:\Software\MyCompany\ToolX
          name: Enabled
          type: dword
          value: 1    

  visual_studio:
    source: shared
    install:
      type: exe
      arguments: ...
      check:
        path_exists: C:\Program Files\Microsoft Visual Studio

    certificate:
      enabled: true
      entries:
        - file: \\share\vs\certificates\MicrosoftWindowsCodeSigningPCA2024.cer
          store_location: LocalMachine
          store_name: CA          
dotnet_hosting_bundle:
  source:
    type: local
    path: "D:\\ManualDrops"
    filename: "dotnet-hosting-bundle.exe"
  install:
    type: exe
    arguments: "/quiet /norestart"
    check:
      path_exists: "C:\\Program Files\\dotnet\\dotnet.exe"

iis_url_rewrite:
  source:
    type: local
    path: "D:\\ManualDrops"
    filename: "rewrite_amd64_en-US.msi"
  install:
    type: msi
    arguments: "/qn"
    check:
      path_exists: "C:\\Program Files\\IIS\\URL Rewrite\\rewrite.dll"

web_deploy:
  source:
    type: local
    path: "D:\\ManualDrops"
    filename: "WebDeploy_amd64_en-US.msi"
  install:
    type: msi
    arguments: "/qn"
    check:
      path_exists: "C:\\Program Files\\IIS\\Microsoft Web Deploy V3\\msdeploy.exe"

aspnetcore_hosting_bundle:
  source:
    type: local
    path: "D:\\ManualDrops"
    filename: "dotnet-hosting-bundle.exe"
  install:
    type: exe
    arguments: "/quiet /norestart"
    check:
      path_exists: "C:\\Program Files\\IIS\\Asp.Net Core Module\\V2\\aspnetcorev2.dll"

uipath_orchestrator_2024.10.1:
  source:
    type: local
    path: "D:\\ManualDrops"
    filename: "UiPathOrchestrator.msi"
  install:
    type: msi
    arguments : >-
      /passive /norestart
      ADDLOCAL=OrchestratorFeature,IdentityFeature,TestAutomationFeature
      CERTIFICATE_SUBJECT={{ uipath_certificate.subject }}
      IS_CERTIFICATE_SUBJECT=1
      DB_SERVER_NAME={{ uipath_db.server }}
      DB_DATABASE_NAME={{ uipath_db.name }}
      DB_AUTHENTICATION_MODE={{ uipath_db.auth | default('Windows') }}
      APPPOOL_IDENTITY_TYPE={{ uipath_apppool.identity_type }}
      APPPOOL_USER_NAME={{ uipath_apppool.username }}
      APPPOOL_PASSWORD={{ uipath_apppool.password }}
      HOSTADMIN_PASSWORD={{ uipath_admin.host_password }}
      HOSTADMIN_PASSWORD_CONFIRM={{ uipath_admin.host_password }}
      DEFAULTTENANTADMIN_PASSWORD={{ uipath_admin.tenant_password }}
      DEFAULTTENANTADMIN_PASSWORD_CONFIRM={{ uipath_admin.tenant_password }}
      TA_DATABASE_NAME={{ uipath_ta.db_name }}
      TA_DB_SERVER_NAME={{ uipath_ta.db_server }}
      INSTALL_LOG={{ uipath_log_dir | default('C:\\Temp\\ansible\\uipath') }}\\install.log

    check:
      path_exists: "C:\\Program Files\\UiPath\\Orchestrator"

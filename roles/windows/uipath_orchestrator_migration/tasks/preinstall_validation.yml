---
- name: UiPath | Preinstall validation stage banner
  ansible.builtin.debug:
    msg:
      - "Stage 2 - preinstall validation"
      - "Fail fast if IIS or required prerequisite software is missing before Orchestrator install."
  when: debug_mode | default(false) | bool

- name: UiPath | Build consolidated prerequisite package list
  ansible.builtin.set_fact:
    uipath_all_prereq_packages: >-
      {{
        (dotnet_hosting_packages | default([]))
        + (uipath_prereq_packages | default([]))
      }}

- name: UiPath | Rebuild resolved prerequisite package list for validation
  ansible.builtin.set_fact:
    resolved_packages: []

- name: UiPath | Resolve prerequisite packages for validation
  ansible.builtin.include_tasks: ../../common/tasks/resolve_installer.yml
  loop: "{{ uipath_all_prereq_packages }}"
  loop_control:
    loop_var: software_key

- name: UiPath | Verify prerequisite markers before Orchestrator install
  ansible.windows.win_stat:
    path: "{{ pkg.install.check.path_exists }}"
  loop: "{{ resolved_packages }}"
  loop_control:
    loop_var: pkg
    label: "{{ pkg.software_key }}"
  register: uipath_prereq_marker_checks

- name: UiPath | Ensure all prerequisite software is installed before Orchestrator install
  ansible.builtin.assert:
    that:
      - prereq_check.stat.exists
    fail_msg: >-
      Required prerequisite '{{ prereq_check.item.software_key }}' is missing.
      Expected marker: {{ prereq_check.item.install.check.path_exists }}
  loop: "{{ uipath_prereq_marker_checks.results | default([]) }}"
  loop_control:
    loop_var: prereq_check
    label: "{{ prereq_check.item.software_key }}"

- name: UiPath | Confirm IIS service is available before Orchestrator install
  ansible.windows.win_service_info:
    name: "{{ uipath_iis_service_name }}"
  register: uipath_iis_service_preinstall

- name: UiPath | Ensure IIS service exists before Orchestrator install
  ansible.builtin.assert:
    that:
      - uipath_iis_service_preinstall.services | length > 0
    fail_msg: >-
      IIS service {{ uipath_iis_service_name }} is not available after prerequisite setup.

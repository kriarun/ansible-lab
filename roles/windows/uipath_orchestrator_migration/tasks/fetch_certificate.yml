---
- name: Read certificates from LocalMachine store
  ansible.windows.win_certificate_info:
    store_location: "{{ ssl_certificate.store_location }}"
    store_name: "{{ ssl_certificate.store_name }}"
  register: uipath_certificates_info

- name: Filter certificates matching configured subject
  ansible.builtin.set_fact:
    uipath_matching_certificates: >-
      {{
        uipath_certificates_info.certificates
        | selectattr('subject', 'search', ssl_certificate.subject)
        | list
      }}

- name: Get current epoch time
  ansible.builtin.set_fact:
    uipath_current_epoch: "{{ lookup('pipe', 'date +%s') | int }}"

- name: Filter valid certificates by current time
  ansible.builtin.set_fact:
    uipath_valid_certificates: >-
      {{
        uipath_matching_certificates
        | selectattr('valid_to', '>', uipath_current_epoch | int)
        | list
      }}

- name: Select thumbprint from valid certificate
  ansible.builtin.set_fact:
    uipath_discovered_thumbprint: >-
      {{
        (
          uipath_valid_certificates
          | sort(attribute='not_after')
          | last
        ).thumbprint | default('')
      }}

- name: Assert certificate thumbprint is present
  ansible.builtin.assert:
    that:
      - uipath_discovered_thumbprint | length > 0
    fail_msg: >-
      No valid certificate thumbprint found in
      {{ ssl_certificate.store_location }}\{{ ssl_certificate.store_name }}
      for subject {{ ssl_certificate.subject }}.

- name: Populate discovered thumbprint into uipath_cert
  ansible.builtin.set_fact:
    ssl_certificate: >-
      {{
        ssl_certificate
        | combine(
            {
              'thumbprint': uipath_discovered_thumbprint
            },
            recursive=True
          )
      }}
    uipath_cert: >-
      {{
        uipath_cert
        | combine(
            {
              'thumbprint': uipath_discovered_thumbprint
            },
            recursive=True
          )
      }}

---
- name: UiPath | Install stage banner
  ansible.builtin.debug:
    msg:
      - "Stage 3 - install"
      - "Install UiPath Orchestrator using the shared catalog engine."
  when: debug_mode | default(false) | bool

- name: UiPath | Resolve UiPath installer package
  ansible.builtin.set_fact:
    resolved_packages: []

- name: UiPath | Resolve UiPath installer from software catalog
  ansible.builtin.include_tasks: ../../common/tasks/resolve_installer.yml
  vars:
    software_key: "{{ uipath_orchestrator_package | default(uipath_installer_package) }}"

- name: UiPath | Select install DB settings
  ansible.builtin.set_fact:
    uipath_install_db: "{{ uipath_orchestrator_install | default(uipath_bootstrap) }}"

- name: UiPath | Build installer arguments
  ansible.builtin.set_fact:
    uipath_orchestrator_install_arguments: >-
      {{ resolved_packages[0].install.arguments | default('') }}
      BOOTSTRAP_DB_SERVER={{ uipath_install_db.db_server }}
      BOOTSTRAP_DB_NAME={{ uipath_install_db.db_name }}
      BOOTSTRAP_DB_AUTH={{ uipath_install_db.db_auth | default('windows') }}
      INSTALL_LOG={{ uipath_log_dir }}\\orchestrator-install.log

- name: UiPath | Execute Orchestrator installer
  ansible.windows.win_package:
    path: "{{ resolved_packages[0].installer.final_path }}"
    arguments: "{{ uipath_orchestrator_install_arguments | trim }}"
    state: present
  register: uipath_orchestrator_install_result
  no_log: true

- name: UiPath | Verify Orchestrator install marker
  ansible.windows.win_stat:
    path: "{{ uipath_install_check_path }}"
  register: uipath_install_marker

- name: UiPath | Ensure Orchestrator installation succeeded
  ansible.builtin.assert:
    that:
      - uipath_install_marker.stat.exists
    fail_msg: >-
      UiPath Orchestrator installation did not create the expected marker path:
      {{ uipath_install_check_path }}

---
- name: UiPath | Bootstrap install stage banner
  ansible.builtin.debug:
    msg:
      - "Stage 5 - bootstrap install"
      - "Install UiPath against the temporary bootstrap DB using the shared catalog engine."
  when: debug_mode | default(false) | bool

- name: UiPath | Resolve bootstrap installer package
  ansible.builtin.set_fact:
    resolved_packages: []

- name: UiPath | Resolve UiPath installer from software catalog
  ansible.builtin.include_tasks: ../../common/tasks/resolve_installer.yml
  vars:
    software_key: "{{ uipath_installer_package }}"

- name: UiPath | Build installer arguments (subject mode)
  ansible.builtin.set_fact:
    uipath_install_arguments: >-
      /passive /norestart
      ADDLOCAL=OrchestratorFeature,IdentityFeature,TestAutomationFeature
      CERTIFICATE_SUBJECT={{ uipath_certificate.subject }}
      IS_CERTIFICATE_SUBJECT=1
      DB_SERVER_NAME={{ uipath_db.server }}
      DB_DATABASE_NAME={{ uipath_db.name }}
      DB_AUTHENTICATION_MODE={{ uipath_db.auth | default('Windows') }}
      APPPOOL_IDENTITY_TYPE={{ uipath_apppool.identity_type }}
      APPPOOL_USER_NAME={{ uipath_apppool.username }}
      APPPOOL_PASSWORD={{ uipath_apppool.password }}
      HOSTADMIN_PASSWORD={{ uipath_admin.host_password }}
      HOSTADMIN_PASSWORD_CONFIRM={{ uipath_admin.host_password }}
      DEFAULTTENANTADMIN_PASSWORD={{ uipath_admin.tenant_password }}
      DEFAULTTENANTADMIN_PASSWORD_CONFIRM={{ uipath_admin.tenant_password }}
      TA_DATABASE_NAME={{ uipath_ta.db_name }}
      TA_DB_SERVER_NAME={{ uipath_ta.db_server }}
      INSTALL_LOG={{ uipath_log_dir | default('C:\\Temp\\ansible\\uipath') }}\\install.log

- name: UiPath | Execute bootstrap installer
  ansible.windows.win_package:
    path: "{{ resolved_packages[0].installer.final_path }}"
    arguments: "{{ uipath_bootstrap_install_arguments | trim }}"
    state: present
  register: uipath_bootstrap_install_result
  no_log: true

- name: UiPath | Verify bootstrap install marker
  ansible.windows.win_stat:
    path: "{{ uipath_install_check_path | default('C:\\Program Files\\UiPath\\Orchestrator') }}"
  register: uipath_install_marker

- name: UiPath | Ensure bootstrap installation succeeded
  ansible.builtin.assert:
    that:
      - uipath_install_marker.stat.exists
    fail_msg: >-
      UiPath bootstrap installation did not create the expected marker path:
      {{ uipath_install_check_path | default('C:\\Program Files\\UiPath\\Orchestrator') }}

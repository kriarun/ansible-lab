---
- name: UiPath | Prerequisite stage banner
  ansible.builtin.debug:
    msg:
      - "Stage 2 - local prerequisites"
      - "Resolve and install prerequisite packages through the shared catalog engine."
  when: debug_mode | default(false) | bool

- name: UiPath | Initialize resolved prerequisite package list
  ansible.builtin.set_fact:
    resolved_packages: []

- name: UiPath | Resolve prerequisite packages from software catalog
  ansible.builtin.include_tasks: ../../common/tasks/resolve_installer.yml
  loop: "{{ uipath_prereq_packages }}"
  loop_control:
    loop_var: software_key

- name: UiPath | Debug prerequisite execution plan
  ansible.builtin.debug:
    var: resolved_packages
  when: debug_mode | default(false) | bool

- name: UiPath | Execute prerequisite installation plan
  ansible.builtin.include_tasks: ../../common/tasks/execute_plan.yml
  loop: "{{ resolved_packages }}"
  loop_control:
    loop_var: pkg

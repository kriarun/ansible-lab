---
- name: UiPath | IIS stage banner
  ansible.builtin.debug:
    msg:
      - "Stage 3 - IIS readiness"
      - "IIS must already exist; this stage only verifies and starts it."
  when: debug_mode | default(false) | bool

- name: UiPath | Check IIS service presence
  ansible.windows.win_service_info:
    name: "{{ uipath_iis_service_name | default('W3SVC') }}"
  register: uipath_iis_service

- name: UiPath | Fail if IIS is not installed
  ansible.builtin.assert:
    that:
      - uipath_iis_service.services | length > 0
    fail_msg: >-
      IIS service {{ uipath_iis_service_name | default('W3SVC') }} was not found.
      Fresh install mode is intentionally not part of this migration flow.

- name: UiPath | Ensure IIS service is running
  ansible.windows.win_service:
    name: "{{ uipath_iis_service_name | default('W3SVC') }}"
    state: started
    start_mode: auto

---
- name: UiPath | Runtime override stage banner
  ansible.builtin.debug:
    msg:
      - "Stage 6 - runtime override"
      - "Prefer machine environment variables first, then optionally fall back to config mutation."
  when: debug_mode | default(false) | bool

- name: UiPath | Build runtime environment variable map
  ansible.builtin.set_fact:
    uipath_runtime_env_map:
      UIPATH_DB_SERVER: "{{ uipath_runtime.db_server }}"
      UIPATH_DB_NAME: "{{ uipath_runtime.db_name }}"
      UIPATH_ELASTIC_URL: "{{ uipath_runtime.elastic_url }}"

- name: UiPath | Apply runtime environment variables at machine level
  ansible.builtin.include_tasks: ../../common/tasks/set_windows_env.yml
  vars:
    machine_env_variables: "{{ uipath_runtime_env_map }}"
  when: uipath_runtime_override.preference | default('env_first') == 'env_first'

- name: UiPath | Validate application health after environment override
  ansible.windows.win_uri:
    url: "{{ uipath_validation.app_url | default('http://localhost') }}"
    method: GET
    return_content: true
    validate_certs: "{{ uipath_validation.app_validate_certs | default(false) }}"
    status_code: [200]
  register: uipath_app_health_after_env
  ignore_errors: true

- name: UiPath | Decide whether config fallback is needed
  ansible.builtin.set_fact:
    uipath_config_fallback_needed: >-
      {{
        (uipath_app_health_after_env is failed)
        and (uipath_runtime_override.allow_config_fallback | default(true))
      }}

- name: UiPath | Apply config fallback placeholder
  ansible.windows.win_powershell:
    script: |
      $path = "{{ uipath_runtime_override.config_file | default('C:\\Program Files\\UiPath\\Orchestrator\\appsettings.json') }}"
      if (-not (Test-Path $path)) {
        throw "Config fallback file not found: $path"
      }

      # Placeholder for lab scaffolding.
      # In the organization repo, replace this with the exact UiPath-supported
      # runtime configuration mutation for DB + Elasticsearch settings.
      "CONFIG_FALLBACK_PLACEHOLDER"
  register: uipath_config_fallback_result
  changed_when: false
  when: uipath_config_fallback_needed | bool

- name: UiPath | Assert runtime override stage reached a valid state
  ansible.builtin.assert:
    that:
      - >-
        (uipath_app_health_after_env is succeeded)
        or
        (uipath_config_fallback_result is defined)
    fail_msg: >-
      Runtime override failed. Environment-based override was not enough and
      config fallback did not complete successfully.

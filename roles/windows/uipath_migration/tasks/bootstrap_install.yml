---
- name: UiPath | Bootstrap install stage banner
  ansible.builtin.debug:
    msg:
      - "Stage 5 - bootstrap install"
      - "Install UiPath against the temporary bootstrap DB using the shared catalog engine."
  when: debug_mode | default(false) | bool

- name: UiPath | Resolve bootstrap installer package
  ansible.builtin.set_fact:
    resolved_packages: []

- name: UiPath | Resolve UiPath installer from software catalog
  ansible.builtin.include_tasks: ../../common/tasks/resolve_installer.yml
  vars:
    software_key: "{{ uipath_installer_package }}"

- name: UiPath | Build bootstrap installer arguments
  ansible.builtin.set_fact:
    uipath_bootstrap_install_arguments: >-
      {{ resolved_packages[0].install.arguments | default('') }}
      BOOTSTRAP_DB_SERVER={{ uipath_bootstrap.db_server }}
      BOOTSTRAP_DB_NAME={{ uipath_bootstrap.db_name }}
      BOOTSTRAP_DB_AUTH={{ uipath_bootstrap.db_auth | default('windows') }}
      INSTALL_LOG={{ uipath_log_dir | default('C:\\Temp\\ansible\\uipath') }}\\bootstrap-install.log

- name: UiPath | Execute bootstrap installer
  ansible.windows.win_package:
    path: "{{ resolved_packages[0].installer.final_path }}"
    arguments: "{{ uipath_bootstrap_install_arguments | trim }}"
    state: present
  register: uipath_bootstrap_install_result
  no_log: true

- name: UiPath | Verify bootstrap install marker
  ansible.windows.win_stat:
    path: "{{ uipath_install_check_path | default('C:\\Program Files\\UiPath\\Orchestrator') }}"
  register: uipath_install_marker

- name: UiPath | Ensure bootstrap installation succeeded
  ansible.builtin.assert:
    that:
      - uipath_install_marker.stat.exists
    fail_msg: >-
      UiPath bootstrap installation did not create the expected marker path:
      {{ uipath_install_check_path | default('C:\\Program Files\\UiPath\\Orchestrator') }}

---
- name: Install python packages
  ansible.builtin.include_tasks: ../../common/tasks/install_from_catalog.yml
  vars:
    software_catalog_entry: python.yml
    software_package_list: "{{ python_packages }}"
    software_role_name: python

- name: Add software paths
  ansible.builtin.include_tasks: ../../common/tasks/add_path.yml
  loop: "{{ resolved_packages }}"
  loop_control:
    loop_var: pkg

- name: Add environment variables
  ansible.builtin.include_tasks: ../../common/tasks/set_windows_env.yml
  vars:
    machine_env_variables: "{{ item.env.variables }}"
  when: item.env is defined and item.env.enabled | default(false)
  loop: "{{ resolved_packages }}"    

- name: Add registry entries
  ansible.builtin.include_tasks: ../../common/tasks/add_registry.yml
  vars:
    registry_entries: "{{ item.registry.entries }}"
  when: item.registry is defined and item.registry.enabled | default(false)
  loop: "{{ resolved_packages }}"

- name: Add certificates
  ansible.builtin.include_tasks: ../../common/tasks/add_certificate.yml
  vars:
    certificate_entries: "{{ item.certificate.entries }}"
  when:
    - ansible_os_family == "Windows"
    - item.certificate is defined
    - item.certificate.enabled | default(false)  

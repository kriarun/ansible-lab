# Expects: software_key, sw
# Sets: resolved_item

- name: Validate local source fields
  ansible.builtin.assert:
    that:
      - sw.source.path is defined
      - sw.source.filename is defined
    fail_msg: >-
      Software '{{ software_key }}' (local) must define:
      source.path and source.filename

- name: Build full local installer path
  ansible.builtin.set_fact:
    local_full_path: "{{ sw.source.path }}\\{{ sw.source.filename }}"

- name: Set resolved item (local)
  ansible.builtin.set_fact:
    resolved_item:
      software_key: "{{ software_key }}"

      source:
        type: "local"
        original_path: "{{ local_full_path }}"
        requires_transfer: false

      installer:
        final_path: "{{ local_full_path }}"
        filename: "{{ sw.source.filename }}"

      install:
        type: "{{ sw.install.type }}"
        arguments: "{{ sw.install.arguments | default('') }}"
        check:
          path_exists: "{{ sw.install.check.path_exists }}"
# Expects: software_key, software_catalog, installer_cache_dir
# Side effects:
# - sets: sw
# - sets: resolved_item
# - appends resolved_item to resolved_packages

- name: Load software catalog if not already loaded
  ansible.builtin.include_tasks: load_software_catalog.yml
  vars:
    software_catalog_entry: "{{ software_catalog_entry | default('') }}"
  when: >-
    software_catalog is not defined
    or (software_catalog_force_reload | default(false))
    or (
      (software_catalog_entry | default('') | trim) != software_catalog_source | default('__undefined__')
    )

- name: Print software catalog
  ansible.builtin.debug:
    var: software_catalog

- name: Validate software key exists in catalog
  ansible.builtin.assert:
    that:
      - software_catalog is defined
      - software_catalog[software_key] is defined
    fail_msg: >-
      Software key '{{ software_key }}' not found in software_catalog.
      Available keys: {{ (software_catalog | default({}, true)).keys() | list }}

- name: Load software entry
  ansible.builtin.set_fact:
    sw: "{{ software_catalog[software_key] }}"

# -------------------------
# Validate source structure
# -------------------------
- name: Validate source structure
  ansible.builtin.assert:
    that:
      - sw.source is defined
      - sw.source.type is defined
      - sw.source.type in ["jfrog", "share", "share_copy", "local"]
    fail_msg: >-
      Software '{{ software_key }}' has invalid or missing source definition.
      Supported types: jfrog, share, share_copy, local

# -------------------------
# Validate install structure
# -------------------------
- name: Validate install structure
  ansible.builtin.assert:
    that:
      - sw.install is defined
      - sw.install.type is defined
      - sw.install.check is defined
      - sw.install.check.path_exists is defined
    fail_msg: >-
      Software '{{ software_key }}' is missing required install metadata
      (install.type and install.check.path_exists are mandatory).

- name: Validate install type
  ansible.builtin.assert:
    that:
      - sw.install.type in ['exe', 'msi', 'zip']
    fail_msg: "Unsupported install type: {{ sw.install.type }}"

- name: Validate PATH configuration
  ansible.builtin.assert:
    that:
      - sw.path.entries is defined
      - sw.path.entries | length > 0
    fail_msg: >
      PATH is enabled for '{{ software_key }}' but 'entries' is missing or empty.
  when:
    - sw.path is defined
    - sw.path.enabled | default(false)  

# Optional: normalize source_type for readability
- name: Normalize source_type
  ansible.builtin.set_fact:
    source_type: "{{ sw.source.type }}"

# -------------------------
# Route to per-source resolver
# -------------------------
- name: Resolve source type jfrog
  ansible.builtin.include_tasks: resolve_jfrog.yml
  when: source_type == "jfrog"

- name: Resolve source type share
  ansible.builtin.include_tasks: resolve_share.yml
  when: source_type == "share"

- name: Resolve source type share_copy
  ansible.builtin.include_tasks: resolve_share_copy.yml
  when: source_type == "share_copy"

- name: Resolve source type local
  ansible.builtin.include_tasks: resolve_local.yml
  when: source_type == "local"

# -------------------------
# Final validation
# -------------------------
- name: Validate resolved_item is produced
  ansible.builtin.assert:
    that:
      - resolved_item is defined
      - resolved_item.software_key is defined
      - resolved_item.installer is defined
      - resolved_item.installer.final_path is defined
      - resolved_item.install is defined
      - resolved_item.install.type is defined
      - resolved_item.install.check.path_exists is defined
    fail_msg: >-
      Resolver did not produce a valid resolved_item for '{{ software_key }}'

- name: Append resolved item
  ansible.builtin.set_fact:
    resolved_packages: "{{ (resolved_packages | default([])) + [ resolved_item ] }}"

---
# Expects: software_key, software_catalog, installer_cache_dir
# Side effects:
# - sets: sw
# - sets: resolved_item
# - appends resolved_item to resolved_packages

- name: Validate software key exists in catalog
  ansible.builtin.assert:
    that:
      - software_catalog is defined
      - software_catalog[software_key] is defined
    fail_msg: >-
      Software key '{{ software_key }}' not found in software_catalog.
      Available keys: {{ (software_catalog | default({})).keys() | list }}

- name: Load software entry
  ansible.builtin.set_fact:
    sw: "{{ software_catalog[software_key] }}"

- name: Validate source is defined and supported
  ansible.builtin.assert:
    that:
      - sw.source is defined
      - sw.source in ["jfrog", "share", "share_copy", "local"]
    fail_msg: >-
      Software '{{ software_key }}' has invalid or missing source '{{ sw.source | default("UNDEFINED") }}'.
      Supported: jfrog, share, share_copy, local


# Route to per-source resolver
- name: Resolve source type jfrog
  ansible.builtin.include_tasks: resolve_jfrog.yml
  when: sw.source == "jfrog"

- name: Resolve source type share
  ansible.builtin.include_tasks: resolve_share.yml
  when: sw.source == "share"

- name: Resolve source type share_copy
  ansible.builtin.include_tasks: resolve_share_copy.yml
  when: sw.source == "share_copy"

- name: Resolve source type local
  ansible.builtin.include_tasks: resolve_local.yml
  when: sw.source == "local"

- name: Validate resolved_item is produced
  ansible.builtin.assert:
    that:
      - resolved_item is defined
      - resolved_item.software_key is defined
      - resolved_item.installer is defined
      - resolved_item.installer.final_path is defined
    fail_msg: "Resolver did not produce resolved_item correctly for '{{ software_key }}'"

- name: Append resolved item
  ansible.builtin.set_fact:
    resolved_packages: "{{ (resolved_packages | default([])) + [ resolved_item ] }}"
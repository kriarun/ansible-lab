# Expects: software_key, sw, installer_cache_dir
# Sets: resolved_item

- name: Validate jfrog fields
  ansible.builtin.assert:
    that:
      - sw.source.url is defined
      - sw.source.filename is defined
      - installer_cache_dir is defined
    fail_msg: >-
      Software '{{ software_key }}' (jfrog) must define:
      source.url, source.filename and installer_cache_dir must be set.

- name: Build cache path for jfrog artifact
  ansible.builtin.set_fact:
    jfrog_cache_path: "{{ installer_cache_dir }}\\{{ software_key }}\\{{ sw.source.filename }}"

- name: Set resolved item (jfrog)
  ansible.builtin.set_fact:
    resolved_item:
      software_key: "{{ software_key }}"

      source:
        type: "jfrog"
        original_path: "{{ sw.source.url }}"
        requires_transfer: true

        # carry auth/material forward (executor can use it)
        api_key: "{{ sw.source.api_key | default(omit) }}"
        bearer_token: "{{ sw.source.bearer_token | default(omit) }}"
        username: "{{ sw.source.username | default(omit) }}"
        password: "{{ sw.source.password | default(omit) }}"

      installer:
        final_path: "{{ jfrog_cache_path }}"
        filename: "{{ sw.source.filename }}"

      install:
        type: "{{ sw.install.type }}"
        arguments: "{{ sw.install.arguments | default('') }}"
        check:
          path_exists: "{{ sw.install.check.path_exists }}"
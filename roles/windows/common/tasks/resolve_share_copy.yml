---
# Expects: software_key, sw, installer_cache_dir
# Sets: resolved_item

- name: Validate share_copy fields
  ansible.builtin.assert:
    that:
      - sw.share_path is defined
      - sw.filename is defined
      - sw.install_args is defined
    fail_msg: >-
      Software '{{ software_key }}' (share_copy) must define: share_path (directory), filename, install_args

- name: Validate share_path is a directory (not a file path)
  ansible.builtin.assert:
    that:
      - not ((sw.share_path | lower).endswith('.exe') or (sw.share_path | lower).endswith('.msi'))
    fail_msg: >-
      Software '{{ software_key }}' (share_copy): share_path must be a DIRECTORY, not a file:
      '{{ sw.share_path }}'

- name: Set resolved item (share_copy)
  ansible.builtin.set_fact:
    resolved_item:
      software_key: "{{ software_key }}"
      source:
        type: "share_copy"
        original_path: "{{ sw.share_path }}\\{{ sw.filename }}"
        requires_transfer: true
      installer:
        final_path: "{{ installer_cache_dir }}\\{{ sw.filename }}"
        filename: "{{ sw.filename }}"
      install:
        arguments: "{{ sw.install_args }}"        
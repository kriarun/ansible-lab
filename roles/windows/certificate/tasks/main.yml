---
- name: Normalize certificate input variables
  ansible.builtin.set_fact:
    certificate_config: "{{ ssl_certificate | default(uipath_cert) }}"

- name: Read certificate info
  ansible.windows.win_certificate_info:
    thumbprint: "{{ certificate_config.thumbprint }}"
    store_name: "{{ certificate_config.store_name }}"
    store_location: "{{ certificate_config.store_location }}"
  register: uipath_cert_info

- name: Import certificate if missing
  ansible.windows.win_certificate_store:
    path: "{{ certificate_config.pfx_path }}"
    password: "{{ certificate_config.pfx_password }}"
    state: present
    store_location: "{{ certificate_config.store_location }}"
    store_name: "{{ certificate_config.store_name }}"
  when:
    - not uipath_cert_info.exists
    - certificate_config.pfx_path | length > 0
  no_log: true

- name: Re-read certificate info
  ansible.windows.win_certificate_info:
    thumbprint: "{{ certificate_config.thumbprint }}"
    store_name: "{{ certificate_config.store_name }}"
    store_location: "{{ certificate_config.store_location }}"
  register: uipath_cert_info_final

- name: Assert certificate exists
  ansible.builtin.assert:
    that:
      - uipath_cert_info_final.exists
    fail_msg: "Required certificate not found."

- name: Validate certificate result
  ansible.builtin.assert:
    that:
      - uipath_cert_info_final.exists
      - uipath_cert_info_final.certificates | length == 1
      - uipath_cert_info_final.certificates[0].valid_to > ansible_date_time.epoch | int
    fail_msg: "Certificate missing, duplicated, or expired."

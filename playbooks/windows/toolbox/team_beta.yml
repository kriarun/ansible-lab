- name: Windows Toolbox Team Beta
  hosts: team_beta
  gather_facts: false

  vars_files:
    - ../../../profiles/windows/toolbox/base.yml

  pre_tasks:
    - name: Load team beta blueprint
      include_vars:
        file: "../../../profiles/windows/toolbox/team_beta.yml"

- name: Compute final roles
  set_fact:
    final_roles: >-
      {{
        (
          (base_roles | default([]))
          + (team_roles | default([]))
          + (env_add_roles | default([]))
        )
        | unique
        | reject('in', (remove_roles | default([])) + (env_remove_roles | default([])))
        | list
      }}

- name: Show composition
  debug:
    msg:
      base_roles: "{{ base_roles | default([]) }}"
      team_roles: "{{ team_roles }}"
      env_add_roles: "{{ env_add_roles }}"
      remove_roles: "{{ remove_roles }}"
      env_remove_roles: "{{ _env_remove_roles }}"
      final_roles: "{{ final_roles }}"

  tasks:
    - name: Execute final roles (debug-only roles for now)
      include_role:
        name: "windows/{{ item }}"
      loop: "{{ final_roles }}"
      when: execute_roles | default(false)|bool